---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  workflows:
    # hassio-addons/workflows v3.0.0
    uses: hassio-addons/workflows/.github/workflows/app-ci.yaml@383c10d83acbe341acbb35a4a61bfd14827f00f0
    permissions:
      actions: read
      contents: write
      packages: read
      pull-requests: read
      security-events: write

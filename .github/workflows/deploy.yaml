---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

jobs:
  workflows:
    # hassio-addons/workflows v3.0.0
    uses: hassio-addons/workflows/.github/workflows/addon-deploy.yaml@383c10d83acbe341acbb35a4a61bfd14827f00f0
    with:
      repository: hassio-addons_repository
      repository_edge: hassio-addons_repository
      repository_beta: hassio-addons_repository
    secrets:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
